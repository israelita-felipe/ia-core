# Spring Boot Configuration for Tests
spring.application.name=ia-core-test
spring.profiles.active=test

# Datasource Configuration for H2 in-memory database
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=false
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# JPA/Hibernate Configuration
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.generate_statistics=false

# Logging Configuration
logging.level.root=WARN
logging.level.com.ia=DEBUG
logging.level.org.springframework.security=DEBUG
logging.level.org.hibernate.SQL=WARN
logging.level.org.hibernate.type.descriptor.sql=WARN

# Flyway Configuration
spring.flyway.enabled=false

# H2 Console (for debugging - disable in production)
spring.h2.console.enabled=false

# Transaction Configuration
spring.jpa.properties.hibernate.enable_lazy_load_no_trans=true

# Quartz Configuration for Tests
spring.quartz.job-store-type=memory
spring.quartz.scheduler-name=testScheduler
spring.quartz.properties.org.quartz.scheduler.instanceId=AUTO
spring.quartz.properties.org.quartz.jobStore.misfireThreshold=60000
