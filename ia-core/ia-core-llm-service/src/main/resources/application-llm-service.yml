spring:
  ai:
    model:
      chat: ollama
      embedding: ollama
    ollama:
      base-url: http://localhost:11434
      chat:
        options:
          model: llama3.2-vision
      embedding:
        model: llama3.2-vision
    mcp:
      server:
        port: 8081
        path: /mcp
      tools:
        usecase-scan:
          enabled: true
          base-package: com.ia
  http:
    client:
      read-timeout: 600000
      connect-timeout: 600000
