# --- Perfil lógico do módulo Flyway com MCP ---
ia-core:
  llm:
    enabled: true
    security:
      protected-paths:
        - /mcp/**
        - /.well-known/agent-card.json
    agent:
      orchestrator-id: ia-core-orchestrator
      tool-scan-packages:
        - com.ia.core.flyway.service
    skill:
      progressive-disclosure: true
    ferramenta:
      discovery:
        enabled: true
        scan-packages:
          - com.ia.core.flyway.service
        refresh-on-startup: true

spring:
  flyway:
    enabled: true
    locations:
    - classpath:db/migrations/{vendor}
    baseline-on-migrate: true
    create-schemas: true
    outOfOrder: true
    validateMigrationNaming: false
  ai:
    mcp:
      server:
        enabled: true
        name: ia-core-flyway
        version: 1.0.0
        sse-endpoint: /mcp/sse
        path: /mcp
        agent-card:
          enabled: true
          path: /.well-known/agent-card.json
      tools:
        usecase-scan:
          enabled: true
          base_package: com.ia.core.flyway.service
