# --- Perfil lógico do módulo Quartz com MCP ---
ia-core:
  quartz:
    scheduler:
      instance-name: "CoreQuartzScheduler"
      instance-id: "AUTO"
      thread-name: "CoreQuartzSchedulerThread"
      make-scheduler-thread-daemon: false
      threads-inherit-context-class-loader: false
      idle-wait-time: 30000ms
      db-failure-retry-interval: 15000ms
      skip-update-check: true
      batch-trigger-acquisition-max-count: 1
      batch-trigger-acquisition-fire-ahead-time-window: 0
      auto-startup: true
      overwrite-existing-jobs: true
      wait-for-jobs-to-complete-on-shutdown: false

    thread-pool:
      thread-count: 1
      thread-priority: 5
      make-threads-daemons: false

    job-store:
      class: "org.quartz.impl.jdbcjobstore.JobStoreTX"
      driver-delegate-class: "org.quartz.impl.jdbcjobstore.HSQLDBDelegate"
      table-prefix: "QUARTZ.QRTZ_"
      use-properties: false
      misfire-threshold: 60000ms
      is-clustered: false
      cluster-checkin-interval: 2000ms
      max-misfires-to-handle-at-a-time: 20
      dont-set-auto-commit-false: false
      acquire-triggers-within-lock: false
      use-enhanced-statements: false

    plugins:
      listeners:
        job:
          class: "com.ia.core.quartz.service.JobsListener"
        trigger:
          class: "com.ia.core.quartz.service.TriggersListener"

  llm:
    enabled: true
    security:
      protected-paths:
        - /mcp/**
        - /.well-known/agent-card.json
    agent:
      orchestrator-id: ia-core-orchestrator
      tool-scan-packages:
        - com.ia.core.quartz.service
    skill:
      progressive-disclosure: true
    ferramenta:
      discovery:
        enabled: true
        scan-packages:
          - com.ia.core.quartz.service
        refresh-on-startup: true
  ai:
    mcp:
      server:
        enabled: true
        name: ia-core-quartz
        version: 1.0.0
        sse-endpoint: /mcp/sse
        path: /mcp
        agent-card:
          enabled: true
          path: /.well-known/agent-card.json
        tools:
          usecase-scan:
            enabled: true
            base_package: com.ia.core.quartz.service
