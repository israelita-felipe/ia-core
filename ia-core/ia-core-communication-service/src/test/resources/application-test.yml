spring:
  datasource:
    url: jdbc:hsqldb:file:${java.io.tmpdir}/testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;HSQLDB.SCRIPT_NAMES=data.sql
    driver-class-name: org.hsqldb.jdbcDriver
    username: sa
    password:
  jpa:
    database-platform: org.hibernate.dialect.HSQLDialect
    hibernate:
      ddl-auto: create-drop
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        jdbc:
          batch_size: 50
  hsql:
    console:
      enabled: true
      path: /hsql
      port: 9001
  mail:
    host: smtp.gmail.com
    port: 465
    username: israelita.felipe@gmail.com
    password: @si1056la
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: false
          ssl:
            enable: true
          connectiontimeout: 5000
          timeout: 5000
          writetimeout: 5000

