api:
  version: v1.0.0
feign:
  host: localhost:8484
  url:
    autor: autor
    abreviacao: abreviacao
    livro: livro
    evento: evento
    authentication: authentication
    user: user
    privilege: privilege
    role: role
    unidade:
      federacao: unidade/federacao
    municipio: municipio
    leitura: leitura
    pessoa: pessoa
    patrocinador: patrocinador
    oracao: oracao
    endereco: endereco
    local: local
    familia: familia
    arquivo: arquivo
    meta: meta
    tipo:
      intencao: tipo/intencao
      patrocinio: tipo/patrocinio
    intencao: intencao
    prompt: llm/prompt
    conta:
      bancaria: conta/bancaria
      contabil: conta/contabil
      conta: conta
    receita:
      receita
    transferencia:
      transferencia
    patrocinio:
      patrocinio
    doacao:
      doacao
    despesa:
      despesa
    movimento:
      financeiro: movimento/financeiro
    banco:
      banco
    agencia:
      agencia
    template: llm/template
    chat: llm/chat
    inscricao: inscricao
    inscricao.evento: inscricao/evento
    log:
      operation: log/operation
    public:
      evento: public/evento
      livro: public/livro
      leitura: public/leitura
    quartz: quartz
    quartz-job: quartz/jobs
    escala: escala
    grupo: grupo
    funcao: funcao
    calendario: calendario
    extratos: extratos
    prestacao-contas: prestacao/contas
    contato-mensagem: contato/mensagem
    grupo-contato: grupo/contato
    modelo-mensagem: modelo/mensagem
    mensagem: mensagem
    flyway-execution: flywayexecution
  client:
    config:
      default:
        connectTimeout: 120000
        readTimeout: 120000
resilience4j:
  circuitbreaker:
    configs:
      default:
        failureRateThreshold: 50
        waitDurationInOpenState: 60s
        slidingWindowSize: 10
        minimumNumberOfCalls: 5
        permittedNumberOfCallsInHalfOpenState: 3
        automaticTransitionFromOpenToHalfOpenEnabled: true
        slowCallRateThreshold: 100
        slowCallDurationThreshold: 5s
        recordExceptions:
          - java.io.IOException
          - java.util.concurrent.TimeoutException
          - org.springframework.web.client.RestClientException
      external-api:
        failureRateThreshold: 40
        waitDurationInOpenState: 30s
        slidingWindowSize: 20
        minimumNumberOfCalls: 10
        permittedNumberOfCallsInHalfOpenState: 5
        slowCallRateThreshold: 80
        slowCallDurationThreshold: 10s
      llm-service:
        failureRateThreshold: 30
        waitDurationInOpenState: 60s
        slidingWindowSize: 5
        minimumNumberOfCalls: 3
        permittedNumberOfCallsInHalfOpenState: 2
        slowCallRateThreshold: 50
        slowCallDurationThreshold: 20s
      web-scraping:
        failureRateThreshold: 50
        waitDurationInOpenState: 120s
        slidingWindowSize: 5
        minimumNumberOfCalls: 3
        permittedNumberOfCallsInHalfOpenState: 2
        slowCallRateThreshold: 60
        slowCallDurationThreshold: 45s
      internal-service:
        failureRateThreshold: 50
        waitDurationInOpenState: 30s
        slidingWindowSize: 20
        minimumNumberOfCalls: 10
        permittedNumberOfCallsInHalfOpenState: 5
      database:
        failureRateThreshold: 60
        waitDurationInOpenState: 30s
        slidingWindowSize: 15
        minimumNumberOfCalls: 5
        permittedNumberOfCallsInHalfOpenState: 3
    instances:
      IBGE:
        baseConfig: external-api
      BibliaChat:
        baseConfig: llm-service
      MiracleScraper:
        baseConfig: web-scraping
  retry:
    configs:
      default:
        maxAttempts: 3
        waitDuration: 1s
        exponentialBackoffMultiplier: 2
        retryExceptions:
          - java.io.IOException
          - java.util.concurrent.TimeoutException
      external-api:
        maxAttempts: 5
        waitDuration: 2s
        exponentialBackoffMultiplier: 2
        retryExceptions:
          - java.io.IOException
          - java.util.concurrent.TimeoutException
          - org.springframework.web.client.RestClientException
      llm-service:
        maxAttempts: 2
        waitDuration: 5s
        exponentialBackoffMultiplier: 2
        retryExceptions:
          - java.io.IOException
          - java.util.concurrent.TimeoutException
      web-scraping:
        maxAttempts: 3
        waitDuration: 3s
        exponentialBackoffMultiplier: 2
        retryExceptions:
          - java.io.IOException
          - org.jsoup.HttpStatusException
      internal-service:
        maxAttempts: 3
        waitDuration: 1s
        exponentialBackoffMultiplier: 2
      database:
        maxAttempts: 3
        waitDuration: 500ms
        exponentialBackoffMultiplier: 2
    instances:
      IBGE:
        baseConfig: external-api
      BibliaChat:
        baseConfig: llm-service
      MiracleScraper:
        baseConfig: web-scraping
  bulkhead:
    configs:
      default:
        maxConcurrentCalls: 10
        maxWaitDuration: 0s
      external-api:
        maxConcurrentCalls: 10
        maxWaitDuration: 1s
      llm-service:
        maxConcurrentCalls: 3
        maxWaitDuration: 5s
      web-scraping:
        maxConcurrentCalls: 2
        maxWaitDuration: 0s
      internal-service:
        maxConcurrentCalls: 20
        maxWaitDuration: 0s
      database:
        maxConcurrentCalls: 15
        maxWaitDuration: 0s
    instances:
      IBGE:
        baseConfig: external-api
      BibliaChat:
        baseConfig: llm-service
      MiracleScraper:
        baseConfig: web-scraping
  ratelimiter:
    configs:
      default:
        limitForPeriod: 100
        limitRefreshPeriod: 1s
        timeoutDuration: 1s
      external-api:
        limitForPeriod: 100
        limitRefreshPeriod: 1s
        timeoutDuration: 500ms
      llm-service:
        limitForPeriod: 10
        limitRefreshPeriod: 1s
        timeoutDuration: 1s
      web-scraping:
        limitForPeriod: 2
        limitRefreshPeriod: 1s
        timeoutDuration: 500ms
      internal-service:
        limitForPeriod: 200
        limitRefreshPeriod: 1s
        timeoutDuration: 500ms
      database:
        limitForPeriod: 500
        limitRefreshPeriod: 1s
        timeoutDuration: 500ms
    instances:
      IBGE:
        baseConfig: external-api
      BibliaChat:
        baseConfig: llm-service
      MiracleScraper:
        baseConfig: web-scraping
  timelimiter:
    configs:
      default:
        timeoutDuration: 10s
        cancelRunningFuture: true
      external-api:
        timeoutDuration: 15s
      llm-service:
        timeoutDuration: 30s
      web-scraping:
        timeoutDuration: 60s
      internal-service:
        timeoutDuration: 10s
      database:
        timeoutDuration: 5s
    instances:
      IBGE:
        baseConfig: external-api
      BibliaChat:
        baseConfig: llm-service
      MiracleScraper:
        baseConfig: web-scraping
logging:
  level:
    '[feign.template]': debug
    '[com.ia.core.resilience4j]': info
vaadin:
  whitelisted-packages:
    - com/ia/biblia
    - com.wontlost
spring:
  threads:
    virtual:
      enabled: true
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB
  main:
    allow-bean-definition-overriding: true
  autoconfigure:
    exclude: org.springframework.boot.autoconfigure.security.servlet.UserDetailsServiceAutoConfiguration		